<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yeni Siteye Geçtik</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
}

/* kutu */

.container{
background:rgba(255,255,255,0.05);
padding:60px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
max-width:600px;
}

/* gökkuşağı yazı */

.rainbow{
font-size:48px;
font-weight:bold;
background: linear-gradient(
90deg,
red,
orange,
yellow,
green,
cyan,
blue,
violet
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-size:400%;
animation:rainbowMove 6s linear infinite;
}

@keyframes rainbowMove{
0%{background-position:0%}
100%{background-position:400%}
}

/* açıklama */

.desc{
margin-top:20px;
font-size:18px;
color:#ccc;
}

/* buton */

.linkBtn{
display:inline-block;
margin-top:35px;
padding:15px 35px;
font-size:20px;
font-weight:bold;
text-decoration:none;
color:white;
border-radius:12px;
background:linear-gradient(
90deg,
red,
orange,
yellow,
green,
cyan,
blue,
violet
);
background-size:400%;
animation:rainbowMove 8s linear infinite;
transition:0.3s;
}

.linkBtn:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<div class="container">

<div class="rainbow">
Yeni Siteye Geçtik!
</div>

<div class="desc">
Artık yeni adresimizi kullanıyoruz.<br>
Devam etmek için aşağıdaki butona tıklayın.
</div>

<a class="linkBtn" href="https://mobilchat.gt.tc/">
Siteye Git
</a>

</div>

</body>
</html>
